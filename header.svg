<svg viewBox="0 0 1000 340" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="CYEVIL // ctOS profile — Rohith Mummadi">
  <defs>
    <pattern id="halft" width="6" height="6" patternUnits="userSpaceOnUse">
      <rect width="6" height="6" fill="#0a0b0e"/>
      <circle cx="1" cy="1" r="0.7" fill="#1fe0ff" opacity="0.06"/>
    </pattern>
    <linearGradient id="cardfill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1fe0ff" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#1fe0ff" stop-opacity="0.02"/>
    </linearGradient>
    <clipPath id="g1"><rect id="r1" x="56" y="158" width="470" height="9"/></clipPath>
    <clipPath id="g2"><rect id="r2" x="56" y="182" width="470" height="7"/></clipPath>
    <filter id="blur"><feGaussianBlur stdDeviation="1"/></filter>
  </defs>

  <style>
    text{font-family:"JetBrains Mono","SFMono-Regular","Consolas",monospace}
    .tag{fill:#4a4f5a;font-size:11px;letter-spacing:2px}
    .name{font-size:46px;font-weight:800;letter-spacing:0}
    .nw{fill:#f4f7fb} .nc{fill:#1fe0ff} .nm{fill:#ff1e6f}
    .nc,.nm{animation:settle 8s linear infinite}
    @keyframes settle{0%{opacity:.9}10%{opacity:.9}13%{opacity:0}70%{opacity:0}72%{opacity:.7}74%{opacity:0}100%{opacity:0}}
    .gj{animation:gj 8s steps(1) infinite}
    @keyframes gj{0%,10%{transform:translate(0,0)}3%{transform:translate(-5px,0)}6%{transform:translate(4px,0)}11%{transform:translate(0,0)}71%{transform:translate(6px,0)}73%{transform:translate(0,0)}100%{transform:translate(0,0)}}
    #r1{animation:t1 8s steps(1) infinite}#r2{animation:t2 8s steps(1) infinite}
    @keyframes t1{0%,9%{transform:translateX(0)}4%{transform:translateX(22px)}10%{transform:translateX(0)}72%{transform:translateX(-18px)}74%{transform:translateX(0)}100%{transform:translateX(0)}}
    @keyframes t2{0%,9%{transform:translateX(0)}6%{transform:translateX(-26px)}10%{transform:translateX(0)}100%{transform:translateX(0)}}

    .net{stroke:#1fe0ff;stroke-width:1;fill:none;stroke-dasharray:680;stroke-dashoffset:680;animation:draw 8s ease-out infinite}
    @keyframes draw{0%{stroke-dashoffset:680;opacity:0}8%{opacity:.55}18%{stroke-dashoffset:0;opacity:.55}90%{opacity:.55}100%{stroke-dashoffset:0;opacity:.2}}
    .node{fill:#1fe0ff;opacity:0;animation:pop 8s ease-out infinite}
    @keyframes pop{0%,14%{opacity:0;r:0}18%{opacity:1}60%{opacity:.5}100%{opacity:.3}}

    .reticle{stroke:#7dff4d;stroke-width:2;fill:none;opacity:0;transform-box:fill-box;transform-origin:center;animation:snap 8s ease-out infinite}
    @keyframes snap{0%,16%{opacity:0;transform:scale(1.15)}22%{opacity:1;transform:scale(1)}92%{opacity:1}100%{opacity:.4}}

    .card{opacity:0;animation:cardin 8s ease-out infinite}
    @keyframes cardin{0%,22%{opacity:0;transform:translateX(14px)}28%{opacity:1;transform:translateX(0)}96%{opacity:1}100%{opacity:.3}}
    .lbl{fill:#5a6470;font-size:10.5px;letter-spacing:1.5px}
    .val{fill:#f4f7fb;font-size:12.5px;letter-spacing:.5px}
    .grn{fill:#7dff4d}

    .bar{animation:fill 8s ease-out infinite;transform-box:fill-box;transform-origin:left}
    @keyframes fill{0%,30%{transform:scaleX(0)}48%{transform:scaleX(1)}100%{transform:scaleX(1)}}
    .crit{opacity:0;animation:critin 8s steps(1) infinite}
    @keyframes critin{0%,46%{opacity:0}48%{opacity:1}50%{opacity:.2}52%,100%{opacity:1}}

    .rec{fill:#ff1e6f;animation:rec 1.1s steps(1) infinite}
    @keyframes rec{0%,50%{opacity:1}51%,100%{opacity:.15}}
    .cur{fill:#7dff4d;animation:rec .9s steps(1) infinite}

    .ticker{animation:scroll 14s linear infinite}
    @keyframes scroll{0%{transform:translateX(0)}100%{transform:translateX(-845px)}}
    .scan{animation:scan 6s linear infinite}
    @keyframes scan{0%{transform:translateY(-10px)}100%{transform:translateY(350px)}}

    @media (prefers-reduced-motion:reduce){
      *{animation:none!important}
      .nc,.nm{opacity:0}.net{stroke-dashoffset:0;opacity:.4}.node{opacity:.4}
      .reticle,.card{opacity:1}.bar{transform:scaleX(1)}.crit{opacity:1}
    }
  </style>

  <rect width="1000" height="340" fill="#0a0b0e"/>
  <rect width="1000" height="340" fill="url(#halft)"/>

  <!-- triangulation network -->
  <g>
    <polyline class="net" points="120,60 360,40 560,90 300,120 120,60"/>
    <polyline class="net" points="560,90 760,50 900,110 760,160 560,90" style="animation-delay:.1s"/>
    <polyline class="net" points="300,120 520,200 760,160" style="animation-delay:.2s"/>
    <polyline class="net" points="120,60 200,210 520,200" style="animation-delay:.15s"/>
    <circle class="node" cx="120" cy="60" r="3"/><circle class="node" cx="360" cy="40" r="3"/>
    <circle class="node" cx="560" cy="90" r="3"/><circle class="node" cx="760" cy="50" r="3"/>
    <circle class="node" cx="900" cy="110" r="3"/><circle class="node" cx="300" cy="120" r="3"/>
    <circle class="node" cx="520" cy="200" r="3"/><circle class="node" cx="200" cy="210" r="3"/>
  </g>

  <text x="56" y="44" class="tag">ctOS_2.0 // REMOTE_ACCESS &gt; TARGET_ACQUIRED</text>

  <!-- subject reticle -->
  <g>
    <path class="reticle" d="M44 158 V140 H62"/>
    <path class="reticle" d="M540 140 H560 V158" style="animation-delay:.05s"/>
    <path class="reticle" d="M44 228 V246 H62" style="animation-delay:.1s"/>
    <path class="reticle" d="M540 246 H560 V228" style="animation-delay:.08s"/>
  </g>

  <!-- subject name with entrance glitch -->
  <g class="name gj">
    <text class="nm" x="58" y="190">ROHITH MUMMADI</text>
    <text class="nc" x="54" y="190">ROHITH MUMMADI</text>
    <text class="nw" x="56" y="190">ROHITH MUMMADI</text>
    <g clip-path="url(#g1)"><text class="nc" x="56" y="190">ROHITH MUMMADI</text></g>
    <g clip-path="url(#g2)"><text class="nm" x="56" y="190">ROHITH MUMMADI</text></g>
  </g>
  <text x="58" y="226" class="grn" style="font-size:18px;font-weight:700;letter-spacing:2px">@CYEVIL<tspan class="cur" dx="6">_</tspan></text>

  <!-- ctOS profiler card -->
  <g class="card">
    <rect x="612" y="64" width="344" height="198" rx="3" fill="url(#cardfill)" stroke="#1fe0ff" stroke-width="1.2"/>
    <rect x="612" y="64" width="344" height="26" fill="#1fe0ff" opacity="0.14"/>
    <text x="624" y="82" class="lbl" style="fill:#1fe0ff">ctOS // PROFILE_LOCKED</text>
    <circle class="rec" cx="906" cy="77" r="4"/>
    <text x="918" y="81" class="lbl" style="fill:#ff1e6f">REC</text>

    <text x="624" y="118" class="lbl">SUBJECT</text>
    <text x="624" y="136" class="val" style="font-size:16px;font-weight:700">ROHITH MUMMADI</text>

    <text x="624" y="162" class="lbl">OCCUPATION</text>
    <text x="624" y="178" class="val">OFFENSIVE SECURITY OPERATOR</text>

    <text x="624" y="204" class="lbl">THREAT LEVEL</text>
    <rect x="624" y="210" width="232" height="9" fill="#1a1d22"/>
    <rect class="bar" x="624" y="210" width="232" height="9" fill="#7dff4d"/>
    <text x="866" y="218" class="crit grn" style="font-size:12px;font-weight:700">CRITICAL</text>

    <text x="624" y="244" class="lbl">TRAITS</text>
    <text x="690" y="244" class="val" style="fill:#aeb6c2">pentest · SOC · cloud · OSCP-in-prog</text>
  </g>

  <!-- breach ticker -->
  <rect x="0" y="304" width="1000" height="36" fill="#101217"/>
  <line x1="0" y1="304" x2="1000" y2="304" stroke="#1fe0ff" stroke-opacity="0.3"/>
  <g clip-path="url(#tickclip)">
    <g class="ticker">
      <text x="0" y="327" class="tag" style="fill:#7dff4d;font-size:12px">&gt;&gt; SYSTEM BREACH IN PROGRESS // ACCESS:ROOT // 0xCYEVIL // CEH·OSCP // exploit chain armed // SOC telemetry tapped // &#160;&#160;&#160;</text>
      <text x="845" y="327" class="tag" style="fill:#7dff4d;font-size:12px">&gt;&gt; SYSTEM BREACH IN PROGRESS // ACCESS:ROOT // 0xCYEVIL // CEH·OSCP // exploit chain armed // SOC telemetry tapped // &#160;&#160;&#160;</text>
    </g>
  </g>
  <clipPath id="tickclip"><rect x="0" y="304" width="1000" height="36"/></clipPath>

  <!-- scanline -->
  <rect class="scan" x="0" y="0" width="1000" height="3" fill="#1fe0ff" opacity="0.05"/>
</svg>
