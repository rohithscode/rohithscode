<svg viewBox="0 0 1000 290" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Rohith Mummadi — Offensive Security">
  <defs>
    <clipPath id="reveal">
      <rect x="56" y="100" height="86" width="0">
        <animate attributeName="width" values="0;730;730;730" keyTimes="0;0.28;0.92;1" dur="9s" repeatCount="indefinite"/>
      </rect>
    </clipPath>
    <clipPath id="ahead">
      <rect x="56" y="100" width="690" height="86">
        <animate attributeName="x"     values="56;786;786;56"   keyTimes="0;0.28;0.92;1" dur="9s" repeatCount="indefinite"/>
        <animate attributeName="width" values="730;0;0;730"      keyTimes="0;0.28;0.92;1" dur="9s" repeatCount="indefinite"/>
      </rect>
    </clipPath>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.4"/>
    </filter>
  </defs>

  <style>
    text { font-family: "JetBrains Mono","SFMono-Regular","Consolas","Courier New",monospace; }
    .meta   { fill:#5f6066; font-size:12.5px; letter-spacing:3px; }
    .accent { fill:#ffb000; }
    .dot    { fill:#ffb000; }
    .name   { font-size:66px; font-weight:700; letter-spacing:1px; }
    .real   { fill:#ece8df; clip-path:url(#reveal); }
    .scramble { fill:#8a6a1f; clip-path:url(#ahead); }
    .role   { fill:#ffb000; font-size:15px; letter-spacing:2px; opacity:0; animation:rolein 9s linear infinite; }
    .scanhead { fill:#ffd27a; filter:url(#soft); }

    .s1{opacity:.9;animation:f1 .42s steps(1) infinite} .s2{opacity:0;animation:f2 .42s steps(1) infinite} .s3{opacity:0;animation:f3 .42s steps(1) infinite}
    @keyframes f1{0%,33%{opacity:.9}34%,100%{opacity:0}}
    @keyframes f2{34%,66%{opacity:.9}0%,33%,67%,100%{opacity:0}}
    @keyframes f3{67%,99%{opacity:.9}0%,66%,100%{opacity:0}}

    @keyframes rolein{0%,30%{opacity:0}36%,90%{opacity:1}100%{opacity:0}}

    .decrypting{fill:#5f6066;font-size:12.5px;letter-spacing:3px;animation:dec 9s linear infinite}
    .granted{fill:#ffb000;font-size:12.5px;letter-spacing:3px;opacity:0;animation:grn 9s linear infinite}
    @keyframes dec{0%,27%{opacity:1}30%,100%{opacity:0}}
    @keyframes grn{0%,29%{opacity:0}31%{opacity:1}33%{opacity:.2}35%,92%{opacity:1}100%{opacity:0}}

    .tick{stroke:#33343c;stroke-width:1.5;fill:none}
    .rule{stroke:#1c1d22;stroke-width:1}

    @media (prefers-reduced-motion: reduce){
      .real{clip-path:none}
      .scramble,.scanhead,.decrypting{display:none}
      .role,.granted{opacity:1;animation:none}
    }
  </style>

  <rect width="1000" height="290" fill="#0a0a0c"/>

  <path class="tick" d="M24 40 V24 H40"/>
  <path class="tick" d="M960 24 H976 V40"/>
  <path class="tick" d="M24 250 V266 H40"/>
  <path class="tick" d="M976 250 V266 H960"/>

  <text x="56" y="58" class="meta">FILE://MUMMADI_R<tspan dx="22" fill="#33343c">|</tspan><tspan dx="22">CLEARANCE: OFFENSIVE-SEC</tspan><tspan dx="22" fill="#33343c">|</tspan><tspan dx="22">NODE: NYC</tspan></text>
  <text x="944" y="58" text-anchor="end" class="decrypting">[ DECRYPTING ]</text>
  <text x="944" y="58" text-anchor="end" class="granted">[ ACCESS&#160;GRANTED ]</text>

  <line class="rule" x1="56" y1="74" x2="944" y2="74"/>

  <g class="name">
    <text class="real" x="56" y="166">ROHITH MUMMADI</text>
    <text class="scramble s1" x="56" y="166">4#K&amp;7! %@&lt;#9*=</text>
    <text class="scramble s2" x="56" y="166">/X9%K7 @7&lt;+#*&amp;</text>
    <text class="scramble s3" x="56" y="166">7&lt;+#!9 +%@9K=8</text>
  </g>

  <rect class="scanhead" x="56" y="100" width="2.5" height="86">
    <animate attributeName="x" values="56;786;786;786" keyTimes="0;0.28;0.92;1" dur="9s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;0.27;0.30;0.99;1" dur="9s" repeatCount="indefinite"/>
  </rect>

  <text x="58" y="208" class="role">// penetration testing&#160;&#160;·&#160;&#160;soc analysis&#160;&#160;·&#160;&#160;cloud security</text>

  <line class="rule" x1="56" y1="234" x2="944" y2="234"/>
  <text x="56" y="256" class="meta">CEH&#160;CERTIFIED<tspan dx="20" fill="#33343c">|</tspan><tspan dx="20">OSCP&#160;//&#160;IN&#160;PROGRESS</tspan><tspan dx="20" fill="#33343c">|</tspan><tspan dx="20">M.S.&#160;CYBERSECURITY</tspan></text>
</svg>
