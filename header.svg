<svg viewBox="0 0 1000 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Rohith M — IT, Security, Cloud">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#141038"/><stop offset="0.24" stop-color="#3a2a63"/>
      <stop offset="0.48" stop-color="#7d3f86"/><stop offset="0.70" stop-color="#c75f7e"/>
      <stop offset="0.86" stop-color="#ef8f63"/><stop offset="1" stop-color="#f6b65c"/>
    </linearGradient>
    <radialGradient id="sun" cx="62%" cy="86%" r="44%">
      <stop offset="0" stop-color="#fff3d6" stop-opacity="0.95"/><stop offset="35%" stop-color="#ffcf8f" stop-opacity="0.45"/><stop offset="100%" stop-color="#ffcf8f" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cloud" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5a3a6e" stop-opacity="0.7"/><stop offset="1" stop-color="#ffb98a" stop-opacity="0.85"/>
    </linearGradient>
    <radialGradient id="namebg" cx="50%" cy="50%" r="50%"><stop offset="0" stop-color="#0b0a1e" stop-opacity="0.55"/><stop offset="100%" stop-color="#0b0a1e" stop-opacity="0"/></radialGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="7"/></filter>
    <filter id="blur2"><feGaussianBlur stdDeviation="2"/></filter>
    <filter id="glow" x="-30%" y="-60%" width="160%" height="220%"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <style>
    text{font-family:"Helvetica Neue",Arial,sans-serif}
    .tw{animation:tw 3s ease-in-out infinite}
    @keyframes tw{0%,100%{opacity:.25}50%{opacity:1}}
    .cloud{animation:drift 26s ease-in-out infinite}
    @keyframes drift{0%,100%{transform:translateX(0)}50%{transform:translateX(26px)}}
    .petal{transform:translate(var(--x),-30px);animation-name:fall;animation-timing-function:linear;animation-iteration-count:infinite}
    @keyframes fall{0%{transform:translate(var(--x),-30px) rotate(0)}100%{transform:translate(calc(var(--x) - 40px),330px) rotate(220deg)}}
    .name{font-weight:300;letter-spacing:13px;opacity:0;animation:rise 1.3s ease-out .2s forwards}
    .sub{font-family:"JetBrains Mono","Consolas",monospace;letter-spacing:8px;opacity:0;animation:rise 1.3s ease-out 1s forwards}
    @keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    .sunb{animation:breathe 6s ease-in-out infinite}
    @keyframes breathe{0%,100%{opacity:.85}50%{opacity:1}}
    @media (prefers-reduced-motion:reduce){*{animation:none!important;opacity:1!important}.petal{opacity:0!important}}
  </style>

