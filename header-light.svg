<svg viewBox="0 0 1000 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Rohith M — IT and Cybersecurity">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#2f6fd0"/><stop offset="0.28" stop-color="#4f8fdf"/><stop offset="0.55" stop-color="#79b0ea"/><stop offset="0.78" stop-color="#a8cef3"/><stop offset="0.92" stop-color="#d6ebfb"/><stop offset="1" stop-color="#eef7ff"/></linearGradient>
    <radialGradient id="glow" cx="62%" cy="22%" r="44%"><stop offset="0" stop-color="#fffdf0" stop-opacity="0.85"/><stop offset="40%" stop-color="#fffdf0" stop-opacity="0.34"/><stop offset="100%" stop-color="#fffdf0" stop-opacity="0"/></radialGradient>
    <linearGradient id="cloud" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#ffffff" stop-opacity="0.7"/><stop offset="1" stop-color="#dfeaf6" stop-opacity="0.85"/></linearGradient>
    <linearGradient id="rule" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#15233f" stop-opacity="0"/><stop offset="0.5" stop-color="#15233f"/><stop offset="1" stop-color="#15233f" stop-opacity="0"/></linearGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="7"/></filter>
    <filter id="mblur"><feGaussianBlur stdDeviation="6"/></filter>
    <filter id="nglow" x="-30%" y="-60%" width="160%" height="220%"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <clipPath id="round"><rect x="0" y="0" width="1000" height="300" rx="22" ry="22"/></clipPath>
  </defs>
  <style>
    text{font-family:"Helvetica Neue",Arial,sans-serif}
    .tw{animation:tw 3s ease-in-out infinite}@keyframes tw{0%,100%{opacity:.25}50%{opacity:1}}
    .cloud{animation:drift 26s ease-in-out infinite}@keyframes drift{0%,100%{transform:translateX(0)}50%{transform:translateX(26px)}}
    .petal{transform:translate(var(--x),-30px);animation-name:fall;animation-timing-function:linear;animation-iteration-count:infinite}
    @keyframes fall{0%{transform:translate(var(--x),-30px) rotate(0)}100%{transform:translate(calc(var(--x) - 40px),330px) rotate(220deg)}}
    .name{font-weight:700;letter-spacing:6px;opacity:0;animation:rise 1.3s ease-out .2s forwards}
    .rul{opacity:0;animation:grow 1.1s ease-out .8s forwards;transform-origin:center;transform-box:fill-box}
    @keyframes grow{from{opacity:0;transform:scaleX(0)}to{opacity:1;transform:scaleX(1)}}
    .sub{font-family:"JetBrains Mono","Consolas",monospace;letter-spacing:7px;opacity:0;animation:rise 1.3s ease-out 1s forwards}
    @keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    @media (prefers-reduced-motion:reduce){*{animation:none!important;opacity:1!important;transform:none!important}.petal{opacity:0!important}}
  </style>
  <g clip-path="url(#round)">
    <rect width="1000" height="300" fill="url(#sky)"/>
    <rect width="1000" height="300" fill="url(#glow)"/>
    
    <g filter="url(#blur)" opacity="0.85">
      <ellipse class="cloud" cx="240" cy="150" rx="150" ry="20" fill="url(#cloud)"/>
      <ellipse class="cloud" style="animation-delay:-8s" cx="640" cy="120" rx="180" ry="16" fill="url(#cloud)"/>
      <ellipse class="cloud" style="animation-delay:-14s" cx="820" cy="178" rx="140" ry="18" fill="url(#cloud)"/>
    </g>
    <path d="M700,66 q6,-7 12,0 q6,-7 12,0" fill="none" stroke="#3a557f" stroke-width="2" stroke-linecap="round" opacity="0.8"/><path d="M732,56 q6,-7 12,0 q6,-7 12,0" fill="none" stroke="#3a557f" stroke-width="2" stroke-linecap="round" opacity="0.8"/><path d="M764,72 q6,-7 12,0 q6,-7 12,0" fill="none" stroke="#3a557f" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
    <path d="M0,250 Q260,214 520,244 T1000,240 V300 H0 Z" fill="#9fb4d8" opacity="0.55"/>
