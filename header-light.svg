    <g class="petal" style="--x:731px;animation-duration:7.6s;animation-delay:5.0s"><path d="M0,0 C4,-5 9,-4 7,2 C6,6 1,6 0,0 Z" fill="#ffffff" opacity="0.8" transform="scale(1.4)"/></g><g class="petal" style="--x:733px;animation-duration:10.7s;animation-delay:0.9s"><path d="M0,0 C4,-5 9,-4 7,2 C6,6 1,6 0,0 Z" fill="#ffffff" opacity="0.8" transform="scale(1.1)"/></g><g class="petal" style="--x:81px;animation-duration:7.1s;animation-delay:5.8s"><path d="M0,0 C4,-5 9,-4 7,2 C6,6 1,6 0,0 Z" fill="#ffffff" opacity="0.8" transform="scale(1.2)"/></g><g class="petal" style="--x:599px;animation-duration:10.0s;animation-delay:0.8s"><path d="M0,0 C4,-5 9,-4 7,2 C6,6 1,6 0,0 Z" fill="#ffffff" opacity="0.8" transform="scale(1.4)"/></g><g class="petal" style="--x:259px;animation-duration:10.3s;animation-delay:1.3s"><path d="M0,0 C4,-5 9,-4 7,2 C6,6 1,6 0,0 Z" fill="#ffffff" opacity="0.8" transform="scale(1.0)"/></g><g class="petal" style="--x:359px;animation-duration:9.0s;animation-delay:4.6s"><path d="M0,0 C4,-5 9,-4 7,2 C6,6 1,6 0,0 Z" fill="#ffffff" opacity="0.8" transform="scale(1.0)"/></g><g class="petal" style="--x:617px;animation-duration:8.7s;animation-delay:0.8s"><path d="M0,0 C4,-5 9,-4 7,2 C6,6 1,6 0,0 Z" fill="#ffffff" opacity="0.8" transform="scale(1.3)"/></g>
