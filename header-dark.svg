  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#141038"/><stop offset="0.24" stop-color="#3a2a63"/><stop offset="0.48" stop-color="#7d3f86"/><stop offset="0.70" stop-color="#c75f7e"/><stop offset="0.86" stop-color="#ef8f63"/><stop offset="1" stop-color="#f6b65c"/></linearGradient>
    <radialGradient id="glow" cx="62%" cy="86%" r="44%"><stop offset="0" stop-color="#fff3d6" stop-opacity="0.85"/><stop offset="40%" stop-color="#fff3d6" stop-opacity="0.34"/><stop offset="100%" stop-color="#fff3d6" stop-opacity="0"/></radialGradient>
    <linearGradient id="cloud" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#5a3a6e" stop-opacity="0.7"/><stop offset="1" stop-color="#ffb98a" stop-opacity="0.85"/></linearGradient>
    <linearGradient id="rule" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#f6b65c" stop-opacity="0"/><stop offset="0.5" stop-color="#f6b65c"/><stop offset="1" stop-color="#f6b65c" stop-opacity="0"/></linearGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="7"/></filter>
    <filter id="mblur"><feGaussianBlur stdDeviation="6"/></filter>
    <filter id="nglow" x="-30%" y="-60%" width="160%" height="220%"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <clipPath id="round"><rect x="0" y="0" width="1000" height="300" rx="22" ry="22"/></clipPath>
  </defs>
  <style>
    text{font-family:"Helvetica Neue",Arial,sans-serif}
    .tw{animation:tw 3s ease-in-out infinite}@keyframes tw{0%,100%{opacity:.25}50%{opacity:1}}
    .cloud{animation:drift 26s ease-in-out infinite}@keyframes drift{0%,100%{transform:translateX(0)}50%{transform:translateX(26px)}}
    .petal{transform:translate(var(--x),-30px);animation-name:fall;animation-timing-function:linear;animation-iteration-count:infinite}
    @keyframes fall{0%{transform:translate(var(--x),-30px) rotate(0)}100%{transform:translate(calc(var(--x) - 40px),330px) rotate(220deg)}}
    .name{font-weight:600;letter-spacing:7px;opacity:0;animation:rise 1.3s ease-out .2s forwards}
    .rul{opacity:0;animation:grow 1.1s ease-out .8s forwards;transform-origin:center;transform-box:fill-box}
    @keyframes grow{from{opacity:0;transform:scaleX(0)}to{opacity:1;transform:scaleX(1)}}
    .sub{font-family:"JetBrains Mono","Consolas",monospace;letter-spacing:7px;opacity:0;animation:rise 1.3s ease-out 1s forwards}
    @keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    @media (prefers-reduced-motion:reduce){*{animation:none!important;opacity:1!important;transform:none!important}.petal{opacity:0!important}}
  </style>
