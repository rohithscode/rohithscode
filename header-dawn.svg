  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#1d2b57"/><stop offset="0.26" stop-color="#44508f"/><stop offset="0.5" stop-color="#8a7ab0"/><stop offset="0.72" stop-color="#e0a6a2"/><stop offset="0.88" stop-color="#f4c79a"/><stop offset="1" stop-color="#f9e3b0"/></linearGradient>
    <radialGradient id="glow" cx="40%" cy="84%" r="44%"><stop offset="0" stop-color="#fff0d8" stop-opacity="0.7"/><stop offset="40%" stop-color="#fff0d8" stop-opacity="0.28"/><stop offset="100%" stop-color="#fff0d8" stop-opacity="0"/></radialGradient>
    <linearGradient id="cloud" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#4a5a8e" stop-opacity="0.7"/><stop offset="1" stop-color="#f4c2b0" stop-opacity="0.85"/></linearGradient>
    <radialGradient id="namebg" cx="50%" cy="50%" r="50%"><stop offset="0" stop-color="#0b0a1e" stop-opacity="0.5"/><stop offset="100%" stop-color="#0b0a1e" stop-opacity="0"/></radialGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="7"/></filter>
    <filter id="mblur"><feGaussianBlur stdDeviation="6"/></filter>
    <filter id="nglow" x="-30%" y="-60%" width="160%" height="220%"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
