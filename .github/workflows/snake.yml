name: generate snake

on:
  schedule:
    # rebuild twice a day so the snake stays current
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Generate snake SVGs
        uses: Platane/snk@v3
        id: snake
        with:
          github_user_name: ${{ github.repository_owner }}
          # light fallback + dark variant tinted to the profile palette
          outputs: |
            dist/snake.svg
            dist/snake-dark.svg?palette=github-dark&color_snake=05d9e8&color_dots=#0a0e14,#073f44,#067e87,#05d9e8,#aefdff

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
